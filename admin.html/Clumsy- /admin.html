<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Hesera Admin</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; user-select:none; -webkit-tap-highlight-color:transparent; }
        body { background:#000; font-family:'Segoe UI',sans-serif; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:12px; overflow:hidden; }
        canvas#bgCanvas { position:fixed; top:0; left:0; width:100%; height:100%; z-index:0; pointer-events:none; }
        .container { position:relative; z-index:10; width:100%; max-width:500px; }
        .header { display:flex; justify-content:space-between; align-items:center; padding:16px 18px; margin-bottom:12px; background:rgba(10,10,10,0.9); border:1px solid rgba(245,158,11,0.15); border-radius:18px; }
        .logo { font-size:18px; font-weight:800; color:#f59e0b; }
        .badge { font-size:9px; font-weight:700; background:rgba(245,158,11,0.12); color:#f59e0b; padding:6px 12px; border-radius:16px; border:1px solid rgba(245,158,11,0.15); }
        .stats-grid { display:grid; grid-template-columns:1fr 1fr; gap:6px; margin-bottom:12px; }
        .stat-card { background:rgba(10,10,10,0.9); border:1px solid rgba(255,255,255,0.03); border-radius:14px; padding:14px; text-align:center; }
        .stat-value { font-size:24px; font-weight:800; color:#638cf6; }
        .stat-label { font-size:9px; color:#555; text-transform:uppercase; margin-top:2px; }
        .tabs { display:flex; gap:4px; margin-bottom:12px; background:rgba(10,10,10,0.8); border-radius:12px; padding:4px; }
        .tab { flex:1; padding:10px; text-align:center; border-radius:10px; cursor:pointer; font-size:11px; font-weight:600; color:#555; }
        .tab.active { background:linear-gradient(135deg,#f59e0b,#d97706); color:#000; font-weight:700; }
        .section { background:rgba(10,10,10,0.9); border:1px solid rgba(255,255,255,0.03); border-radius:16px; padding:14px; margin-bottom:12px; }
        .section-title { font-size:12px; font-weight:700; color:#fff; margin-bottom:12px; }
        .list-item { background:rgba(15,15,15,0.8); border:1px solid rgba(255,255,255,0.02); border-radius:12px; padding:12px; margin-bottom:6px; display:flex; justify-content:space-between; align-items:center; }
        .item-code { font-family:monospace; font-size:11px; font-weight:700; color:#638cf6; word-break:break-all; }
        .item-meta { font-size:9px; color:#555; margin-top:2px; }
        .item-status { font-size:8px; font-weight:600; padding:2px 6px; border-radius:6px; }
        .item-status.active { background:rgba(34,197,94,0.1); color:#4ade80; }
        .item-status.revoked { background:rgba(239,68,68,0.1); color:#f87171; }
        .item-actions { display:flex; gap:4px; }
        .icon-btn { width:28px; height:28px; border-radius:8px; border:1px solid rgba(255,255,255,0.05); background:rgba(255,255,255,0.02); color:#94a3b8; cursor:pointer; font-size:12px; display:flex; align-items:center; justify-content:center; }
        .input-group { margin-bottom:10px; }
        .input-label { font-size:9px; color:#555; text-transform:uppercase; margin-bottom:4px; font-weight:600; }
        .input-field { width:100%; background:#111; border:1px solid #1e293b; border-radius:10px; padding:10px 12px; font-size:13px; color:#fff; outline:none; }
        .input-field:focus { border-color:#f59e0b; }
        .btn { width:100%; padding:11px; border:none; border-radius:10px; font-size:12px; font-weight:700; cursor:pointer; color:#fff; margin-bottom:6px; }
        .btn-primary { background:linear-gradient(135deg,#f59e0b,#d97706); color:#000; }
        .btn-green { background:linear-gradient(135deg,#22c55e,#16a34a); }
        .btn-red { background:linear-gradient(135deg,#dc2626,#991b1b); }
        .btn-purple { background:linear-gradient(135deg,#8b5cf6,#6d28d9); }
        .btn-outline { background:transparent; border:1px solid rgba(245,158,11,0.2); color:#f59e0b; }
        .generated-key { margin-top:8px; padding:12px; text-align:center; background:rgba(15,15,15,0.9); border:2px dashed rgba(245,158,11,0.2); border-radius:10px; font-family:monospace; font-size:13px; color:#f59e0b; font-weight:700; word-break:break-all; }
        .log-list { max-height:200px; overflow-y:auto; }
        .log-item { display:flex; gap:6px; align-items:center; padding:8px; border-bottom:1px solid rgba(255,255,255,0.02); font-size:9px; }
        .log-time { color:#555; min-width:50px; font-size:8px; }
        .log-dot { width:4px; height:4px; border-radius:50%; background:#f59e0b; }
        .empty-state { text-align:center; padding:20px; color:#555; font-size:11px; }
        .toast { position:fixed; bottom:20px; left:20px; right:20px; background:#1a1a1a; color:#fff; padding:12px; border-radius:10px; text-align:center; font-weight:600; font-size:12px; opacity:0; transition:0.3s; z-index:50000; }
        .toast.show { opacity:1; }
        .hidden { display:none; }
    </style>
</head>
<body>
<canvas id="bgCanvas"></canvas>

<div class="container">
    <div class="header"><div class="logo">&#x25C8; Hesera Admin</div><div class="badge">ADMIN</div></div>
    <div class="stats-grid">
        <div class="stat-card"><div class="stat-value" id="totalKeys">0</div><div class="stat-label">Total Keys</div></div>
        <div class="stat-card"><div class="stat-value" id="activeKeys">0</div><div class="stat-label">Active</div></div>
        <div class="stat-card"><div class="stat-value" id="revokedKeys">0</div><div class="stat-label">Revoked</div></div>
        <div class="stat-card"><div class="stat-value" id="totalConfigs">0</div><div class="stat-label">Configs</div></div>
    </div>
    <div class="tabs">
        <div class="tab active" onclick="switchTab('keys',this)">Keys</div>
        <div class="tab" onclick="switchTab('gen',this)">Generate</div>
        <div class="tab" onclick="switchTab('configs',this)">Configs</div>
        <div class="tab" onclick="switchTab('logs',this)">Logs</div>
    </div>
    <div id="tabKeys" class="section"><div class="section-title">License Keys</div><div id="keyList"></div></div>
    <div id="tabGen" class="section hidden">
        <div class="section-title">Generate New Key</div>
        <div class="input-group"><div class="input-label">Duration</div><input class="input-field" id="genDur" placeholder="7d, 30d, forever" value="7d"></div>
        <div class="input-group"><div class="input-label">Prefix</div><input class="input-field" id="genPref" placeholder="VIP"></div>
        <button class="btn btn-primary" onclick="generateKey()">Generate Key</button>
        <div id="genResult" class="hidden"><div class="generated-key" id="genKeyDisplay"></div><button class="btn btn-green" style="margin-top:6px;" onclick="copyGenKey()">Copy</button></div>
    </div>
    <div id="tabConfigs" class="section hidden"><div class="section-title">User Configs</div><div id="cfgList"></div></div>
    <div id="tabLogs" class="section hidden"><div class="section-title">Activity Log</div><div class="log-list" id="logList"></div><button class="btn btn-red" style="margin-top:8px;" onclick="clearLogs()">Clear</button></div>
    <div class="section">
        <div class="section-title">Server Upload</div>
        <div class="input-group"><div class="input-label">GitHub Token</div><input class="input-field" id="githubToken" type="password" placeholder="ghp_..."></div>
        <button class="btn btn-green" onclick="uploadKeysToGitHub()">Upload Keys to GitHub</button>
        <button class="btn btn-outline" onclick="downloadKeysFile()">Download keys.json</button>
    </div>
    <div class="section">
        <div class="section-title">Tools</div>
        <button class="btn btn-outline" onclick="exportAll()">Export Backup</button>
        <button class="btn btn-purple" onclick="importAll()">Import Backup</button>
        <button class="btn btn-red" onclick="resetAll()">Reset All</button>
    </div>
</div>
<div class="toast" id="toast"></div>

<script>
const canvas=document.getElementById('bgCanvas'),ctx=canvas.getContext('2d');
let particles=[],mouseX=-1000,mouseY=-1000;
function resizeCanvas(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;}
resizeCanvas();window.addEventListener('resize',resizeCanvas);
for(let i=0;i<50;i++){particles.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,vx:(Math.random()-0.5)*0.3,vy:(Math.random()-0.5)*0.3,size:Math.random()*2+0.4,alpha:Math.random()*0.3+0.1});}
document.addEventListener('touchmove',function(e){mouseX=e.touches[0].clientX;mouseY=e.touches[0].clientY;});
function animate(){ctx.clearRect(0,0,canvas.width,canvas.height);ctx.fillStyle='#000';ctx.fillRect(0,0,canvas.width,canvas.height);particles.forEach(function(p){p.x+=p.vx;p.y+=p.vy;if(p.x<0||p.x>canvas.width)p.vx*=-1;if(p.y<0||p.y>canvas.height)p.vy*=-1;var dx=mouseX-p.x,dy=mouseY-p.y,dist=Math.sqrt(dx*dx+dy*dy);if(dist<150&&dist>0){p.vx+=dx/dist*0.02;p.vy+=dy/dist*0.02;}p.vx*=0.999;p.vy*=0.999;ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.fillStyle='rgba(245,158,11,'+(p.alpha+0.1)+')';ctx.fill();});requestAnimationFrame(animate);}
animate();

let genKeyVal='';
function showToast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(function(){t.classList.remove('show')},2000);}
function $(id){return document.getElementById(id);}
function switchTab(tab,el){document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active');});el.classList.add('active');$('tabKeys').classList.toggle('hidden',tab!=='keys');$('tabGen').classList.toggle('hidden',tab!=='gen');$('tabConfigs').classList.toggle('hidden',tab!=='configs');$('tabLogs').classList.toggle('hidden',tab!=='logs');if(tab==='configs')renderConfigs();if(tab==='logs')renderLogs();}
function updateStats(){var keys=JSON.parse(localStorage.getItem('hesera_keys')||'[]');$('totalKeys').textContent=keys.length;$('activeKeys').textContent=keys.filter(function(k){return !k.revoked;}).length;$('revokedKeys').textContent=keys.filter(function(k){return k.revoked;}).length;$('totalConfigs').textContent=(JSON.parse(localStorage.getItem('clumsy_cfg')||'[]')).length;}
function renderKeys(){var keys=JSON.parse(localStorage.getItem('hesera_keys')||'[]'),list=$('keyList');if(!keys.length){list.innerHTML='<div class="empty-state"><p>No keys yet</p></div>';updateStats();return;}list.innerHTML=keys.map(function(k,i){return'<div class="list-item"><div><div class="item-code">'+k.key+'</div><div class="item-meta"><span class="item-status '+(k.revoked?'revoked':'active')+'">'+(k.revoked?'REVOKED':'ACTIVE')+'</span> &bull; '+new Date(k.created).toLocaleDateString()+' &bull; '+k.duration+'</div></div><div class="item-actions"><button class="icon-btn copy" onclick="copyKey(\''+k.key+'\')">&#x2398;</button>'+(k.revoked?'':'<button class="icon-btn revoke" onclick="revokeKey('+i+')">&#x2715;</button>')+'</div></div>';}).join('');updateStats();}
function copyKey(key){if(navigator.clipboard){navigator.clipboard.writeText(key).then(function(){showToast('Copied!');});}else{var t=document.createElement('textarea');t.value=key;t.style.position='fixed';t.style.left='-9999px';document.body.appendChild(t);t.select();try{document.execCommand('copy');showToast('Copied!');}catch(e){}document.body.removeChild(t);}}
function generateKey(){var dur=$('genDur').value.trim().toLowerCase()||'7d',prefix=$('genPref').value.trim().toUpperCase(),chars='ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789',code='';for(var i=0;i<8;i++)code+=chars[Math.floor(Math.random()*chars.length)];var key='HESERA-';if(prefix)key+=prefix+'-';key+=code+'-'+dur;var keys=JSON.parse(localStorage.getItem('hesera_keys')||'[]');keys.push({key:key,duration:dur,created:Date.now(),revoked:false});localStorage.setItem('hesera_keys',JSON.stringify(keys));genKeyVal=key;$('genKeyDisplay').textContent=key;$('genResult').classList.remove('hidden');renderKeys();showToast('Key generated!');}
function copyGenKey(){if(genKeyVal)copyKey(genKeyVal);else showToast('No key');}
function revokeKey(i){var keys=JSON.parse(localStorage.getItem('hesera_keys')||'[]');if(keys[i]){keys[i].revoked=true;localStorage.setItem('hesera_keys',JSON.stringify(keys));renderKeys();showToast('Revoked!');}}
function renderConfigs(){var c=JSON.parse(localStorage.getItem('clumsy_cfg')||'[]'),list=$('cfgList');if(!c.length){list.innerHTML='<div class="empty-state"><p>No configs</p></div>';return;}list.innerHTML=c.map(function(x,i){return'<div class="list-item"><div style="font-weight:700;color:#fff;">'+x.name+'</div><button class="icon-btn revoke" onclick="delCfg('+i+')">&#x2715;</button></div>';}).join('');}
function delCfg(i){var c=JSON.parse(localStorage.getItem('clumsy_cfg')||'[]');c.splice(i,1);localStorage.setItem('clumsy_cfg',JSON.stringify(c));renderConfigs();updateStats();showToast('Deleted');}
function renderLogs(){var logs=JSON.parse(localStorage.getItem('hesera_logs')||'[]'),list=$('logList');if(!logs.length){list.innerHTML='<div class="empty-state"><p>No activity</p></div>';return;}list.innerHTML=logs.map(function(l){return'<div class="log-item"><span class="log-dot"></span><span class="log-time">'+new Date(l.time).toLocaleString()+'</span>'+l.msg+'</div>';}).join('');}
function clearLogs(){localStorage.removeItem('hesera_logs');renderLogs();showToast('Cleared');}
async function uploadKeysToGitHub(){var token=$('githubToken').value.trim();if(!token){showToast('Enter GitHub Token!');return;}var keys=JSON.parse(localStorage.getItem('hesera_keys')||'[]');if(!keys.length){showToast('No keys!');return;}try{var getResp=await fetch('https://api.github.com/repos/lanysoft999-stack/Clumsy-/contents/keys.json',{headers:{'Authorization':'token '+token}});if(!getResp.ok){showToast('Error: Check token');return;}var fileData=await getResp.json();var data={keys:keys,updated:new Date().toISOString()};var content=btoa(unescape(encodeURIComponent(JSON.stringify(data,null,2))));var putResp=await fetch('https://api.github.com/repos/lanysoft999-stack/Clumsy-/contents/keys.json',{method:'PUT',headers:{'Authorization':'token '+token,'Content-Type':'application/json'},body:JSON.stringify({message:'Update keys',content:content,sha:fileData.sha})});if(putResp.ok){showToast('Uploaded!');}else{showToast('Failed');}}catch(e){showToast('Network error');}}
function downloadKeysFile(){var keys=JSON.parse(localStorage.getItem('hesera_keys')||'[]');if(!keys.length){showToast('No keys!');return;}var data={keys:keys,updated:new Date().toISOString()};var blob=new Blob([JSON.stringify(data)],{type:'application/json'});var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='keys.json';document.body.appendChild(a);a.click();document.body.removeChild(a);showToast('Downloaded!');}
function exportAll(){var d={keys:JSON.parse(localStorage.getItem('hesera_keys')||'[]'),configs:JSON.parse(localStorage.getItem('clumsy_cfg')||'[]')};var b=new Blob([JSON.stringify(d)],{type:'application/json'});var a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='backup.json';a.click();showToast('Exported');}
function importAll(){var inp=document.createElement('input');inp.type='file';inp.accept='.json';inp.onchange=function(e){var r=new FileReader();r.onload=function(ev){try{var d=JSON.parse(ev.target.result);if(d.keys)localStorage.setItem('hesera_keys',JSON.stringify(d.keys));if(d.configs)localStorage.setItem('clumsy_cfg',JSON.stringify(d.configs));renderKeys();renderConfigs();updateStats();showToast('Imported!');}catch(ex){showToast('Invalid file');}};r.readAsText(e.target.files[0]);};inp.click();}
function resetAll(){if(confirm('Delete ALL?')){localStorage.clear();renderKeys();renderConfigs();renderLogs();updateStats();showToast('Reset done');}}

renderKeys();updateStats();renderLogs();
</script>
</body>
</html>
